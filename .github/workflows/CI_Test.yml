name: Java CI

# 触发条件：当有代码推送到 main 分支，或者向 main 分支发起 Pull Request 时触发
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 运行环境：最新版的 Ubuntu 虚拟机
    runs-on: ubuntu-latest

    steps:
    # 第一步：拉取仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 第二步：配置 Java 开发环境 (这里默认使用 Java 17，您可以根据需要修改)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 第三步：编译根目录下的 HelloWorld.java 文件
    - name: Compile Java code
      run: javac HelloWorld.java

    # 第四步：运行编译后的 class 文件（测试是否能正常输出）
    - name: Run HelloWorld
      run: java HelloWorld
