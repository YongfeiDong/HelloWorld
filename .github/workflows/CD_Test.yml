name: Java CD (Auto Release)

# 触发条件：当推送以 'v' 开头的标签 (Tag) 时触发，例如 v1.0, v2.1.3
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # 必须配置写权限，否则无法自动创建 Release
    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. 编译代码
    - name: Compile Java code
      run: javac HelloWorld.java

    # 2. 将编译后的 .class 文件打包成可执行的 .jar 文件
    - name: Package to JAR
      # cfe: c(创建) f(指定文件名) e(指定主类/入口点)
      run: jar cfe HelloWorld.jar HelloWorld HelloWorld.class

    # 3. 自动创建 GitHub Release 并上传打包好的 JAR 文件
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: HelloWorld.jar
        generate_release_notes: true # 自动根据 commit 生成更新日志
